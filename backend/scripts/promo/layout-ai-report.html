<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:linear-gradient(150deg,#16233b,#0f2038); width:1040px; height:1320px; display:grid; place-items:center; }
  .card { width:1000px; background:#fff; border-radius:36px; overflow:hidden;
    font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.55); }
  .tiles { display:grid; grid-template-columns:1fr 1fr; }
  .tile { padding:40px 44px 48px; color:#fff; }
  .tile.clicks { background:#4c7df0; }
  .tile.impr   { background:#6a3fd6; }
  .tile .lbl { display:flex; align-items:center; gap:14px; font-size:34px; font-weight:600; opacity:.96; }
  .tile .lbl .chk { width:34px; height:34px; border:3px solid rgba(255,255,255,.85); border-radius:8px;
    display:grid; place-items:center; }
  .tile .lbl .chk svg { width:22px; height:22px; }
  .tile .num { margin-top:22px; font-size:104px; font-weight:800; letter-spacing:-2px; line-height:1; }
  .body { padding:40px 46px 44px; }
  .axis { display:flex; justify-content:space-between; font-size:30px; color:#6b7280; font-weight:600; }
  .axis .r { color:#6b7280; }
  .chartwrap { position:relative; margin-top:8px; }
  .dates { display:flex; justify-content:space-between; margin-top:18px; font-size:30px; color:#9aa1ad; font-weight:500; }
  .anno { position:absolute; left:355px; top:70px; }
  .anno .bubble { background:#141922; color:#fff; font-size:30px; font-weight:600; padding:16px 26px;
    border-radius:16px; white-space:nowrap; position:relative; }
  .anno .bubble:after { content:''; position:absolute; left:50%; bottom:-13px; transform:translateX(-50%);
    border:14px solid transparent; border-top-color:#141922; border-bottom:0; }
  .anno .badge { width:120px; height:120px; margin:26px auto 0; background:#fff; border:5px solid #6a3fd6;
    border-radius:50%; display:grid; place-items:center; box-shadow:0 10px 30px -6px rgba(106,63,214,.5); }
  .anno .badge svg { width:58px; height:58px; }
  .anno .stem { width:4px; height:70px; margin:0 auto; background:linear-gradient(#c9b8f2, #6a3fd6); }
  .anno .dot { width:34px; height:34px; border-radius:50%; background:#6a3fd6; margin:0 auto;
    box-shadow:0 0 0 12px rgba(106,63,214,.18); }
</style></head><body>
<div class="card">
  <div class="tiles">
    <div class="tile clicks">
      <div class="lbl"><span class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><path d="m5 12 5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Ad clicks</div>
      <div class="num">2.4k</div>
    </div>
    <div class="tile impr">
      <div class="lbl"><span class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><path d="m5 12 5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Site visitors</div>
      <div class="num">31k</div>
    </div>
  </div>
  <div class="body">
    <div class="axis"><span>Clicks</span><span class="r">Visitors</span></div>
    <div class="chartwrap">
      <svg viewBox="0 0 900 470" width="100%">
        <!-- gridlines -->
        <g stroke="#eceef2" stroke-width="2">
          <line x1="70" y1="30"  x2="830" y2="30"/>
          <line x1="70" y1="150" x2="830" y2="150"/>
          <line x1="70" y1="270" x2="830" y2="270"/>
          <line x1="70" y1="390" x2="830" y2="390"/>
        </g>
        <!-- y labels left -->
        <g fill="#9aa1ad" font-size="26" font-weight="600" font-family="sans-serif">
          <text x="0" y="38">2.3k</text><text x="12" y="158">1.5k</text><text x="20" y="278">760</text><text x="40" y="398">0</text>
        </g>
        <!-- y labels right -->
        <g fill="#9aa1ad" font-size="26" font-weight="600" font-family="sans-serif" text-anchor="end">
          <text x="900" y="38">31k</text><text x="900" y="158">21k</text><text x="900" y="278">10k</text><text x="900" y="398">0</text>
        </g>
        <!-- impressions/visitors (purple) -->
        <path d="M70 372 L110 366 L150 372 L190 360 L230 362 L270 348 L310 340 L350 320 L390 300 L430 305 L470 250 L510 232 L550 190 L590 205 L630 150 L670 120 L710 95 L750 130 L790 70 L830 45"
          fill="none" stroke="#6a3fd6" stroke-width="5" stroke-linjoin="round" stroke-linecap="round"/>
        <!-- clicks (blue) -->
        <path d="M70 378 L110 380 L150 370 L190 372 L230 366 L270 360 L310 352 L350 335 L390 330 L430 300 L470 285 L510 268 L550 235 L590 250 L630 175 L670 165 L710 110 L750 90 L790 120 L830 55"
          fill="none" stroke="#4c7df0" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
      <!-- annotation -->
      <div class="anno">
        <div class="bubble">Started running ads</div>
        <div class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="#6a3fd6" stroke-width="2"><path d="M5 15c0-5 4-11 10-11 0 6-6 10-10 10zM5 15l-1 5 5-1M14.5 8.5a1.5 1.5 0 1 0 .01-.01" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="stem"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="dates"><span>17 Apr 2025</span><span>15 Jul 2025</span></div>
  </div>
</div>
</body></html>
