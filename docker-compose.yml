name: runmyprint

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rmp_app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
      - redis
    networks: [rmp]

  web:
    image: nginx:1.27-alpine
    container_name: rmp_web
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [rmp]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: mysql:8.0
    container_name: rmp_db
    environment:
      MYSQL_DATABASE: runmyprint
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: rmp
      MYSQL_PASSWORD: rmp
    ports:
      - "127.0.0.1:33060:3306"   # loopback only — NEVER publish the DB to the internet
    volumes:
      - dbdata:/var/lib/mysql
    networks: [rmp]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: rmp_redis
    ports:
      - "127.0.0.1:63790:6379"   # loopback only — passwordless redis must not be reachable
    networks: [rmp]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Frontend dev server (Vite). Start explicitly: docker compose --profile dev up node
  node:
    image: node:22-alpine
    container_name: rmp_node
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles: ["dev"]
    networks: [rmp]

volumes:
  dbdata:

networks:
  rmp:
    driver: bridge
