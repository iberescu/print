server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Allow large artwork uploads (print-ready files)
    client_max_body_size 64M;

    # Hashed Vite bundles never change content for a given name — cache hard.
    # (Old hashes are kept across deploys, so stale HTML can't 404 into a blank page.)
    location /build/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Canonical host. Sessions are host-scoped cookies, so a cart built on
# www.runmyprint.com is invisible on runmyprint.com — where the Google OAuth
# callback always lands (fixed redirect URI): the sign-in "lost" the cart and
# the checkout redirect. One host, one session. (Block placed second so the
# catch-all above stays nginx's default for localhost / direct-IP requests.)
server {
    listen 80;
    server_name www.runmyprint.com;
    return 301 https://runmyprint.com$request_uri;
}
